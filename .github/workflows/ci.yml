name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        # Use actions-rs/toolchain which is maintained and available on GitHub Actions
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Build & test
        run: |
          cd backend
          cargo build --verbose
          cargo test --verbose

  frontend:
    name: Frontend CI (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          # CI runs in different checkout layouts. Prefer the workspace path used in the repo,
          # but fall back to the top-level frontend folder when the worktree path isn't present.
          if [ -d worktrees/opencode/frontend ]; then
            cd worktrees/opencode/frontend
          else
            cd frontend
          fi
          npm ci
      - name: Run unit tests
        run: |
          if [ -d worktrees/opencode/frontend ]; then
            cd worktrees/opencode/frontend
          else
            cd frontend
          fi
          npm test

  smoke-e2e:
    name: Smoke E2E (backend + frontend)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust & Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run e2e smoke script
        run: |
          chmod +x ./scripts/e2e-smoke.sh || true
          ./scripts/e2e-smoke.sh
